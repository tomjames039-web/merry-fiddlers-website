[build]
  command = "bun run build"
  publish = ".next"

[build.environment]
  # The Stripe publishable key is PUBLIC by design and is intentionally
  # included in the client bundle, so it's safe to exclude from scanning.
  # STRIPE_WEBHOOK_SECRET is only ever read server-side (api/webhook); any
  # match in the bundle is a false positive (value overlap with the public
  # key / build cache), so we exclude it here too.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,STRIPE_WEBHOOK_SECRET"
  SECRETS_SCAN_OMIT_PATHS = ".next/cache/**,.netlify/**"

[[plugins]]
  package = "@netlify/plugin-nextjs"
